<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>VENTANA MODAL</h1>   
    <p>Lorem ipsum dolor sit amet consectetur adipsicing elit. Repudiandae repellendus facere nihil sit inventore consectetur</p> 
    <p>Hola buenos dias</p> 
    <button onclick=abrirmodal(); id="btn-abrir-modal">Abrir Modal</button>

    <dialog id="modal">
        <h2>Hola, soy un modal</h2>
        <p>Hola</p>
        <p>Adios</p>
        <button onclick=cerrarmodal(); id="btn-cerrar0-modal">Cerrar Modal</button>
    </dialog>

    <script>
        function abrirmodal(){
            const modal = document.querySelector("#modal");
            modal.showModal();
        }

        function cerrarmodal(){
            const modal = document.querySelector("#modal");
            modal.close();
        }
    </script>
</body>
</html>
