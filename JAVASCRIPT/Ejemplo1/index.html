<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gonzalo Vereda">
    <title>PRUEBA CLASE 1</title>
</head>

<body>
    <label>Peso:</label>
    <input type="text" id="peso">
    <label>Altura:</label>
    <input type="text" id="altura">

    <button onclick="IMC()">calcular</button>
    <p id="respuesta"></p>
    <script>
        function IMC() {
            const peso = document.getElementById("peso");
            const altura = document.getElementById("altura");
            const respuesta = document.getElementById("respuesta");
            let PESO = peso.value;
            let ALTURA = altura.value;
            let IMCtotal = PESO/(ALTURA*ALTURA);

            respuesta.textContent = IMCtotal;
            if (IMCtotal < 18,5){
                respuesta.textContent=("bien");
            }else if{
                 respuesta.textContent=("mal");
            }
        }
    </script>
</body>

</html>
